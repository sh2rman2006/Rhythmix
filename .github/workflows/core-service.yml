name: pipeline

on:
  push:
    branches: ["dev"]
    paths:
      - "Backend/core-service/**"
      - ".github/workflows/core-service.yml"

permissions:
  contents: write

env:
  IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/rhythmix-core-service

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: Backend/core-service
          file: Backend/core-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Export image ref
        id: meta
        run: echo "image_ref=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy (bump helm values)
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: Update image tag in values-dev.yaml
        run: |
          sed -i "s/^  tag: .*/  tag: \"${GITHUB_SHA}\"/" Backend/core-service/helm/values-dev.yaml

      - name: Commit & push helm values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Backend/core-service/helm/values-dev.yaml
          git commit -m "chore(core-service): deploy ${GITHUB_SHA}" || exit 0
          git push
