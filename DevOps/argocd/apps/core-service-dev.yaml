apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-service-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sh2rman2006/Rhythmix
    targetRevision: dev
    path: Backend/core-service/helm
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: rhythmix-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
