namespace: rhythmix-dev

postgres:
  image: postgres:16
  username: rhythmix
  password: rhythmix-dev-pass
  database: rhythmix
  storageSize: 5Gi

redis:
  image: redis:7
  storageSize: 1Gi

minio:
  image: quay.io/minio/minio:latest
  accessKey: rhythmix-minio
  secretKey: rhythmix-minio-dev-pass
  storageSize: 10Gi

kafka:
  enabled: true

  service:
    name: kafka
    port: 9092

  image:
    repository: apache/kafka
    tag: "3.7.0"
    pullPolicy: IfNotPresent

  # лог-директория внутри контейнера
  logDir: "/var/lib/kafka/data"

  # стабильный clusterId для KRaft (можно оставить как есть)
  clusterId: "PVjHlx7ESeesq55jeB6Efw"

  # как брокер будет себя анонсировать клиентам
  advertisedHost: "kafka.rhythmix-dev.svc"
  advertisedPort: 9092

