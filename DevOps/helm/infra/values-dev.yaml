namespace: rhythmix-dev

postgres:
  image: postgres:16
  username: rhythmix
  password: rhythmix-dev-pass
  database: rhythmix
  storageSize: 5Gi

redis:
  image: redis:7
  storageSize: 1Gi

minio:
  image: quay.io/minio/minio:latest
  accessKey: rhythmix-minio
  secretKey: rhythmix-minio-dev-pass
  storageSize: 10Gi

kafka:
  enabled: true

  image:
    repository: bitnami/kafka
    tag: 3.7
    pullPolicy: IfNotPresent

  kraft:
    clusterId: "PVjHlx7ESeesq55jeB6Efw"
    controllerQuorumVoters: "1@kafka.rhythmix-dev.svc:9091"

  service:
    name: kafka
    port: 9090