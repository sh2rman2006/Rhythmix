{{- if .Values.kafka.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kafka.service.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: {{ .Values.kafka.service.port }}
      targetPort: 9092

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: {{ $.Values.namespace }}
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          ports:
            - containerPort: 9092
          # Основной трюк: форматируем storage и сразу запускаем брокер
          command:
            - /bin/bash
            - -c
            - |
              cat <<EOF > /etc/kafka/server.properties
              process.roles=controller,broker
              node.id=1
              controller.quorum.voters=1@kafka.{{ $.Values.namespace }}.svc.cluster.local:9093
              listeners=PLAINTEXT://:9092,CONTROLLER://:9093
              advertised.listeners=PLAINTEXT://kafka.{{ $.Values.namespace }}.svc.cluster.local:9092
              listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
              controller.listener.names=CONTROLLER
              inter.broker.listener.name=PLAINTEXT
              log.dirs={{ .Values.kafka.logDir }}
              offsets.topic.replication.factor=1
              transaction.state.log.replication.factor=1
              transaction.state.log.min.isr=1
              auto.create.topics.enable=true
              EOF

              # Форматируем хранилище KRaft (если лог-директория чистая – ок, для dev можно делать всегда)
              kafka-storage.sh format \
                -t {{ .Values.kafka.clusterId }} \
                -c /etc/kafka/server.properties

              # Запускаем брокер+контроллер
              kafka-server-start.sh /etc/kafka/server.properties
          volumeMounts:
            - name: kafka-data
              mountPath: {{ .Values.kafka.logDir }}
      volumes:
        - name: kafka-data
          emptyDir: {}
{{- end }}
