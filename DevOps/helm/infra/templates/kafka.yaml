{{- if .Values.kafka.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kafka.service.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: {{ .Values.kafka.service.port }}
      targetPort: 9092

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: {{ $.Values.namespace }}
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          ports:
            - containerPort: 9092
          command:
            - /bin/bash
            - -c
            - |
              set -e

              KAFKA_BIN=/opt/kafka/bin
              KAFKA_CONFIG=/opt/kafka/config/kraft/server.properties

              # форматируем storage, если ещё не
              if [ ! -f {{ .Values.kafka.logDir }}/meta.properties ]; then
                KAFKA_CLUSTER_ID="$(${KAFKA_BIN}/kafka-storage.sh random-uuid)"
                ${KAFKA_BIN}/kafka-storage.sh format \
                  -t "${KAFKA_CLUSTER_ID}" \
                  -c "${KAFKA_CONFIG}"
              fi

              # стартуем брокер, ПЕРЕОПРЕДЕЛЯЯ advertised.listeners
              exec ${KAFKA_BIN}/kafka-server-start.sh "${KAFKA_CONFIG}" \
                --override advertised.listeners=PLAINTEXT://{{ .Values.kafka.advertisedHost }}:{{ .Values.kafka.advertisedPort }}

          volumeMounts:
            - name: kafka-data
              mountPath: {{ .Values.kafka.logDir }}
      volumes:
        - name: kafka-data
          emptyDir: {}
{{- end }}
