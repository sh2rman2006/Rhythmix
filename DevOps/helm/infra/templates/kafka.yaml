{{- if .Values.kafka.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kafka.service.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: {{ .Values.kafka.service.port }}
      targetPort: 9092

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: {{ $.Values.namespace }}
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          ports:
            - containerPort: 9092

          env:
            # KRaft + сетевые настройки
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.{{ $.Values.namespace }}.svc:{{ .Values.kafka.service.port }}"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "controller,broker"
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CFG_NODE_ID
              value: "1"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka.{{ $.Values.namespace }}.svc:9093"
            - name: KAFKA_LOG_DIRS
              value: "{{ .Values.kafka.logDir }}"

          # Основной трюк: форматируем storage и сразу запускаем брокер
          command:
            - /bin/bash
            - -c
            - |
              set -e

              KAFKA_BIN=/opt/kafka/bin
              KAFKA_CONFIG=/opt/kafka/config/kraft/server.properties
              DATA_DIR="{{ .Values.kafka.logDir }}"

              # если лог-директория пустая — форматируем хранилище
              if [ ! -f "${DATA_DIR}/meta.properties" ]; then
                KAFKA_CLUSTER_ID="{{ .Values.kafka.clusterId }}"
                if [ -z "${KAFKA_CLUSTER_ID}" ]; then
                  KAFKA_CLUSTER_ID="$(${KAFKA_BIN}/kafka-storage.sh random-uuid)"
                fi

                ${KAFKA_BIN}/kafka-storage.sh format \
                  -t "${KAFKA_CLUSTER_ID}" \
                  -c "${KAFKA_CONFIG}"
              fi

              # запускаем брокер в KRaft
              exec ${KAFKA_BIN}/kafka-server-start.sh "${KAFKA_CONFIG}"

          volumeMounts:
            - name: kafka-data
              mountPath: {{ .Values.kafka.logDir }}
      volumes:
        - name: kafka-data
          emptyDir: { }
{{- end }}
