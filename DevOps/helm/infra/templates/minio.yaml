apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: { { .Values.namespace } }
type: Opaque
stringData:
  MINIO_ROOT_USER: { { .Values.minio.accessKey | quote } }
  MINIO_ROOT_PASSWORD: { { .Values.minio.secretKey | quote } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: { { .Values.namespace } }
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: { { .Values.minio.storageSize | quote } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: { { .Values.namespace } }
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: { { .Values.minio.image } }
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef:
                name: minio-secret
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: { { .Values.namespace } }
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
