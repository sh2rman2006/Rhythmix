apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: { { .Values.namespace } }
type: Opaque
stringData:
  POSTGRES_USER: { { .Values.postgres.username | quote } }
  POSTGRES_PASSWORD: { { .Values.postgres.password | quote } }
  POSTGRES_DB: { { .Values.postgres.database | quote } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: { { .Values.namespace } }
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: { { .Values.postgres.storageSize | quote } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: { { .Values.namespace } }
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: { { .Values.postgres.image } }
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: { { .Values.namespace } }
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
